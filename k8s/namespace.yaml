apiVersion: v1
kind: Namespace
metadata:
  name: omnisight

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: omnisight-config
  namespace: omnisight
data:
  LOG_LEVEL: "info"
  ENABLE_GPU: "false"
  DEVICE: "cpu"

---
apiVersion: v1
kind: Secret
metadata:
  name: omnisight-secrets
  namespace: omnisight
type: Opaque
stringData:
  DATABASE_URL: "postgresql://omnisight:password@postgres:5432/omnisight"
  REDIS_URL: "redis://redis:6379/0"
  S3_ACCESS_KEY: "minioadmin"
  S3_SECRET_KEY: "minioadmin"
  SECRET_KEY: "your-secret-key-change-in-production"
