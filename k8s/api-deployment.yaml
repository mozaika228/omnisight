apiVersion: apps/v1
kind: Deployment
metadata:
  name: omnisight-api
  namespace: omnisight
spec:
  replicas: 3
  selector:
    matchLabels:
      app: omnisight-api
  template:
    metadata:
      labels:
        app: omnisight-api
    spec:
      containers:
      - name: api
        image: omnisight/api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: omnisight-config
              key: LOG_LEVEL
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: omnisight-secrets
              key: DATABASE_URL
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: omnisight-api
  namespace: omnisight
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8000
  selector:
    app: omnisight-api
