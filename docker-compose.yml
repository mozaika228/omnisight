version: '3.8'

services:
  # Database
  postgres:
    image: postgres:16-alpine
    container_name: omnisight-postgres
    environment:
      POSTGRES_DB: omnisight
      POSTGRES_USER: omnisight
      POSTGRES_PASSWORD: omnisight_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnisight"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - omnisight

  # Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: omnisight-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT_API_KEY=omnisight_dev_key
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - omnisight

  # Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: omnisight-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - omnisight

  # Object Storage
  minio:
    image: minio/minio:latest
    container_name: omnisight-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: omnisight
      MINIO_ROOT_PASSWORD: omnisight_dev_password
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - omnisight

  # API Server
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: omnisight-api
    ports:
      - "8000:8000"
    environment:
      # Database
      DATABASE_URL: postgresql://omnisight:omnisight_dev_password@postgres:5432/omnisight
      
      # Vector DB
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: omnisight_dev_key
      
      # Cache & Queue
      REDIS_URL: redis://redis:6379/0
      
      # Storage
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: omnisight
      S3_SECRET_KEY: omnisight_dev_password
      S3_BUCKET: omnisight-videos
      
      # API
      API_HOST: 0.0.0.0
      API_PORT: 8000
      LOG_LEVEL: info
      
      # Models
      YOLO_MODEL: yolov11n
      WHISPER_MODEL: base
      EMBEDDING_MODEL: openai/clip-vit-base-patch32
      LLM_MODEL: mistral
      
      # Features
      ENABLE_GPU: "false"  # Set to true if NVIDIA GPU available
      DEVICE: cpu  # cuda or cpu
    volumes:
      - ./apps/api:/app
      - model_cache:/root/.cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - omnisight
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8000 --reload

  # Celery Worker for Detection
  worker_detection:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: omnisight-worker-detection
    environment:
      DATABASE_URL: postgresql://omnisight:omnisight_dev_password@postgres:5432/omnisight
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: omnisight
      S3_SECRET_KEY: omnisight_dev_password
      CELERY_BROKER: redis://redis:6379/0
      WORKER_TYPE: detection
      ENABLE_GPU: "false"
      DEVICE: cpu
    volumes:
      - ./services:/app/services
      - model_cache:/root/.cache
    depends_on:
      - postgres
      - redis
      - qdrant
      - minio
    networks:
      - omnisight
    command: celery -A services.detection.tasks worker --loglevel=info -Q detection

  # Celery Worker for Transcription
  worker_transcription:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: omnisight-worker-transcription
    environment:
      DATABASE_URL: postgresql://omnisight:omnisight_dev_password@postgres:5432/omnisight
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: omnisight
      S3_SECRET_KEY: omnisight_dev_password
      CELERY_BROKER: redis://redis:6379/0
      WORKER_TYPE: transcription
      ENABLE_GPU: "false"
      DEVICE: cpu
    volumes:
      - ./services:/app/services
      - model_cache:/root/.cache
    depends_on:
      - postgres
      - redis
      - qdrant
      - minio
    networks:
      - omnisight
    command: celery -A services.transcription.tasks worker --loglevel=info -Q transcription

  # Celery Worker for Embeddings
  worker_embeddings:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: omnisight-worker-embeddings
    environment:
      DATABASE_URL: postgresql://omnisight:omnisight_dev_password@postgres:5432/omnisight
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: omnisight_dev_key
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: omnisight
      S3_SECRET_KEY: omnisight_dev_password
      CELERY_BROKER: redis://redis:6379/0
      WORKER_TYPE: embeddings
      ENABLE_GPU: "false"
      DEVICE: cpu
    volumes:
      - ./services:/app/services
      - model_cache:/root/.cache
    depends_on:
      - postgres
      - redis
      - qdrant
      - minio
    networks:
      - omnisight
    command: celery -A services.embeddings.tasks worker --loglevel=info -Q embeddings

  # Frontend
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: omnisight-web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/api/v1
    depends_on:
      - api
    networks:
      - omnisight
    command: npm run dev

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
  minio_data:
  model_cache:

networks:
  omnisight:
    driver: bridge
